context:
  # ── Institutional knowledge: patterns ──
  - kind: pattern
    content: "OWASP A03 Injection: SQL injection remains the #1 web vulnerability. Always check string concatenation/interpolation in SQL queries. Parameterized queries are the only reliable defense — input sanitization is not sufficient."
    tags: [injection, sql, owasp]
    task_ref: null

  - kind: pattern
    content: "OWASP A03 XSS: Check all three vectors — reflected (echo user input), stored (render saved content), DOM-based (client-side JS manipulation). Auto-escaping in templates is necessary but not sufficient — check for |safe filters, innerHTML, and render_template_string."
    tags: [injection, xss, owasp]
    task_ref: null

  - kind: pattern
    content: "Hardcoded secrets are not just in .py/.js files. Check Dockerfiles (ARG/ENV), CI configs (.github/workflows), docker-compose.yml, README examples, test fixtures, and migration scripts. Default fallback values (os.getenv('SECRET', 'dev-key')) are hardcoded secrets."
    tags: [secrets, config]
    task_ref: null

  - kind: pattern
    content: "JWT algorithm confusion: If the server accepts HS256 when it expects RS256, an attacker can sign tokens with the public key. Always verify the algorithm in the token matches what the server expects. Use allowlists, not blocklists, for algorithm selection."
    tags: [auth, jwt, crypto]
    task_ref: null

  - kind: pattern
    content: "Deserialization is RCE: pickle.loads, yaml.load (without SafeLoader), and Marshal.load on untrusted input are effectively eval(). These are always Critical severity regardless of authentication status. The safe alternatives are json.loads, yaml.safe_load, and schema-validated parsers."
    tags: [deserialization, rce]
    task_ref: null

  - kind: pattern
    content: "Race conditions in financial/inventory operations: Check for TOCTOU between validation and action. If 'check balance' and 'deduct balance' are separate queries without a transaction lock, concurrent requests can double-spend. Use SELECT ... FOR UPDATE or application-level locks."
    tags: [bizlogic, race-condition]
    task_ref: null

  - kind: constraint
    content: "Rate limiting must be applied to: login attempts (5/min), registration (3/hour/IP), password reset (3/hour/account), API endpoints (varies by tier), file uploads (size + count). Rate limit storage must be shared across instances (Redis, not in-memory)."
    tags: [rate-limiting, abuse]
    task_ref: null

  - kind: constraint
    content: "Password hashing requirements: Use bcrypt (cost 12+), scrypt, or Argon2id. Never MD5, SHA-1, SHA-256 (even with salt). Verify unique salt per password. Cost factor should make hashing take 100-500ms on target hardware."
    tags: [crypto, passwords]
    task_ref: null

  - kind: constraint
    content: "Security headers checklist: Content-Security-Policy (script-src, style-src, default-src), X-Content-Type-Options: nosniff, X-Frame-Options: DENY, Strict-Transport-Security: max-age=31536000; includeSubDomains, Referrer-Policy: strict-origin-when-cross-origin, Permissions-Policy (camera, microphone, geolocation)."
    tags: [headers, infra]
    task_ref: null

  - kind: constraint
    content: "CORS policy: Never use Access-Control-Allow-Origin: * with credentials. Maintain an explicit origin allowlist. Verify CORS headers are also set on error responses (4xx, 5xx). Check for null origin bypass."
    tags: [cors, infra]
    task_ref: null

  - kind: constraint
    content: "File upload defense in depth: 1) Extension allowlist (not blocklist), 2) MIME type validation, 3) File size limit, 4) Rename uploaded files (UUID), 5) Store outside webroot, 6) Serve via content-disposition: attachment, 7) Scan for malware if possible."
    tags: [file-upload, data]
    task_ref: null

  - kind: pattern
    content: "Supply chain attacks: Check for typosquatting (lodash vs 1odash, requests vs reqeusts). Verify lockfile integrity — if lockfile doesn't match manifest, something changed. Check for pre/post-install scripts in dependencies that execute arbitrary code."
    tags: [deps, supply-chain]
    task_ref: null

  - kind: pattern
    content: "SSRF bypass techniques: Attackers bypass URL allowlists using DNS rebinding, IPv6 (::1), decimal IP (2130706433 = 127.0.0.1), URL encoding, redirects, and cloud metadata endpoints (169.254.169.254). URL validation must resolve DNS and check the IP, not just the hostname."
    tags: [ssrf, injection]
    task_ref: null

  - kind: pattern
    content: "Error message information disclosure: Stack traces reveal file paths, framework versions, and internal logic. Database errors reveal table/column names. Auth errors should never distinguish between 'user not found' and 'wrong password' — always return generic 'invalid credentials'."
    tags: [info-disclosure, errors]
    task_ref: null

  - kind: constraint
    content: "Session cookie requirements: HttpOnly (prevents JS access), Secure (HTTPS only), SameSite=Lax or Strict (CSRF prevention), Path=/ (or most restrictive applicable), Domain (explicit, not parent domain), Max-Age or Expires (session timeout)."
    tags: [session, cookies]
    task_ref: null

  - kind: pattern
    content: "Command injection beyond shell=True: Check for os.system(), subprocess with shell=True, backtick execution in Ruby/PHP, eval() in any language, template engines that allow code execution (Jinja2 sandbox bypass, Mako templates). Also check for indirect injection via filenames passed to shell commands."
    tags: [injection, command]
    task_ref: null
