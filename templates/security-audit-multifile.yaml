  content: 'Finding: High, OWASP A01 Broken Access Control. POST /api/orders at server.py:30-46 authorizes solely on the JWT sub claim and never verifies user existence, token issuer, or role constraints, so a forged token for any subject is accepted as that user.'
  tags: []
  task_ref: task-3
- kind: finding
  content: 'Finding: Critical, OWASP A03 Injection. GET /api/products at server.py:18-23 concatenates the q query parameter into a SQLite LIKE clause with an f-string, allowing SQL injection through attacker-controlled search text.'
  tags: []
  task_ref: task-2
- kind: finding
  content: 'Finding: Critical, OWASP A03 Injection. GET /api/orders at server.py:48-53 concatenates user_id directly into SQL and performs no authentication, so an attacker can combine SQL injection with arbitrary order enumeration.'
  tags: []
  task_ref: task-2
- kind: finding
  content: 'Finding: High, OWASP A03 Injection. POST /api/products/<id>/review at server.py:25-28 reflects request.json[''text''] directly into an HTML fragment without escaping, creating reflected/stored-style XSS if the output is rendered by a browser client.'
  tags: []
  task_ref: task-2
- kind: discovery
  content: 'Discovery: attack surface in server.py has 6 HTTP endpoints. Public/unauthenticated: GET /api/products, POST /api/products/<id>/review, GET /api/orders, POST /api/import, GET /api/export, POST /api/admin/reset. Token-using route: POST /api/orders. Admin boundary is implied only by path naming; no server-side admin enforcement exists on /api/admin/reset.'
  tags: []
  task_ref: task-1
- kind: finding
  content: 'Finding: High, OWASP A02 Cryptographic Failures. POST /api/key at app.py:107-115 generates API keys with Python''s random module and a simple uppercase alphabet. This RNG is not suitable for security tokens, making generated API keys materially more predictable than secrets produced by a cryptographically secure generator.'
  tags: []
  task_ref: task-10
- kind: finding
  content: 'Finding: High, OWASP A01 Broken Access Control. The application defines multiple state-changing routes such as POST /register, POST /login, POST /posts, POST /admin/exec, POST /import-config, POST /upload, and POST /api/key but implements no CSRF protection or Origin/Referer validation anywhere in app.py. A victim browsing while authenticated can be induced to trigger unwanted actions from another site.'
  tags: []
  task_ref: task-10
- kind: finding
  content: 'Finding: Critical, OWASP A01 Broken Access Control. POST /upload at app.py:100-105 is unauthenticated and lets any caller write a file to the server. There is no authorization gate, extension allowlist, MIME validation, or storage isolation, so the endpoint grants arbitrary write capability to anonymous users.'
  tags: []
  task_ref: task-9
- kind: finding
  content: 'Finding: High, OWASP A05 Security Misconfiguration. POST /upload at app.py:102-104 joins the attacker-controlled filename directly into /tmp/uploads and saves it without sanitization. Filenames containing ../ enable path traversal and arbitrary file overwrite outside the intended directory.'
  tags: []
  task_ref: task-9
- kind: finding
  content: 'Finding: Critical, OWASP A03 Injection. POST /admin/exec at app.py:61-67 passes request.json[''command''] into subprocess.check_output with shell=True. Any attacker who obtains or forges an admin session can execute arbitrary shell commands on the server.'
  tags: []
  task_ref: task-9
- kind: finding
  content: 'Finding: Critical, OWASP A08 Software and Data Integrity Failures. POST /import-config at app.py:94-97 calls yaml.load on raw untrusted request data without a safe loader. PyYAML can instantiate attacker-controlled objects, so this endpoint is a direct remote code execution path.'
  tags: []
  task_ref: task-8
- kind: finding
  content: 'Finding: High, OWASP A05 Security Misconfiguration. POST /import-config at app.py:96-97 applies attacker-supplied keys directly into app.config with no authentication, schema validation, or allowlist. Even without object gadget execution, a caller can tamper with runtime security settings such as SECRET_KEY-derived behavior, cookie controls, or debug-related options.'
  tags: []
  task_ref: task-8
- kind: finding
  content: 'Finding: Critical, OWASP A08 Software and Data Integrity Failures. GET /export at app.py:88-92 deserializes attacker-controlled input with pickle.loads after base64 decoding. Any user who can hit the endpoint can supply a malicious pickle payload and achieve arbitrary code execution during object reconstruction.'
  tags: []
  task_ref: task-8
- kind: discovery
  content: 'Dependency review note: PyYAML 5.4.1 does not appear in the checked OSV advisory PYSEC-2021-142 affected range, which is fixed in 5.4. The exploitable issue in this app is the direct use of yaml.load on untrusted request data, not a version-specific CVE in the pinned release.'
  tags: []
  task_ref: task-5
- kind: finding
  content: 'Finding: Medium, OWASP A06 Vulnerable and Outdated Components. requirements.txt pins flask==2.3.0, and GitHub advisory GHSA-m2qf-hxjv-5gpq / CVE-2023-30861 lists affected versions >=2.3.0 and <2.3.2. The advisory is condition-dependent, but the application is on a known-vulnerable release and should be upgraded to at least 2.3.2 or a supported newer line.'
  tags: []
  task_ref: task-5
- kind: finding
  content: 'Finding: High, OWASP A05 Security Misconfiguration. app.py:5 sets Flask secret_key from SECRET_KEY but falls back to the hardcoded value dev-secret-key-change-me. If the deployment keeps the default, attackers can forge Flask session cookies, impersonate users, and escalate privileges by writing arbitrary session data such as role=admin.'
  tags: []
  task_ref: task-4
- kind: finding
  content: 'Finding: High, OWASP A05 Security Misconfiguration. app.py:120 runs the server with debug=True and host=0.0.0.0. In a reachable environment this exposes interactive debugger risk and verbose error leakage to remote clients, turning otherwise contained exceptions into severe compromise paths.'
  tags: []
  task_ref: task-4
- kind: finding
  content: 'Finding: High, OWASP A01 Broken Access Control. GET /posts at app.py:69-75 allows the caller to supply any user_id and returns rows where user_id matches, with no verification that the requester owns that account. This is an IDOR exposing private posts across users.'
  tags: []
  task_ref: task-3
- kind: finding
  content: 'Finding: High, OWASP A01 Broken Access Control. GET /admin/users at app.py:54-59 exposes the full user directory, including email addresses and roles, without any authentication or admin authorization check. Any unauthenticated caller can enumerate accounts and privileged roles.'
  tags: []
  task_ref: task-3
- kind: finding
  content: 'Finding: High, OWASP A02 Cryptographic Failures. POST /register and POST /login at app.py:27 and app.py:38 use unsalted MD5 for password hashing. MD5 is fast and broken for password storage, making offline cracking of the users table practical after any database disclosure.'
  tags: []
  task_ref: task-3
- kind: finding
  content: 'Finding: Medium, OWASP A07 Identification and Authentication Failures. POST /login at app.py:44 returns a base64-encoded string of user_id and username as a token, with no signature, integrity protection, or expiry. If downstream clients treat it as an auth token, it is trivially forgeable and leaks internal identifiers.'
  tags: []
  task_ref: task-3
- kind: finding
  content: 'Finding: High, OWASP A03 Injection. GET /profile/<username> at app.py:50-52 renders attacker-controlled username and email values into render_template_string. Because those fields can be seeded through /register and are compiled as a Jinja template, this creates stored XSS and server-side template injection exposure rather than safe escaped rendering.'
  tags: []
  task_ref: task-2
- kind: finding
  content: 'Finding: Critical, OWASP A03 Injection. POST /register at app.py:23-30 builds the INSERT with f-string interpolation of username and email. An attacker can inject SQL through either field to alter the users table, bypass uniqueness assumptions, or corrupt authentication data. No server-side validation or parameter binding is present.'
  tags: []
  task_ref: task-2
- kind: finding
  content: 'Finding: Critical, OWASP A03 Injection. POST /login at app.py:35-40 builds the credential lookup with f-string interpolation of username and the MD5 hash. A crafted username such as quote-or-true payloads can bypass authentication and establish a session as the first matched row. Input is trusted directly in SQL.'
  tags: []
  task_ref: task-2
- kind: finding
  content: 'Finding: High, OWASP A03 Injection. GET /profile/<username> at app.py:47-52 injects the path parameter directly into a SELECT statement. This exposes user enumeration data and can be used for arbitrary row access or query manipulation through the username segment.'
  tags: []
  task_ref: task-2
- kind: finding
  content: 'Finding: High, OWASP A03 Injection. GET /posts at app.py:71-74 interpolates the user_id query parameter directly into SQL. Because the route concatenates user input into the WHERE clause, an attacker can inject arbitrary SQL fragments and expand the returned dataset beyond intended visibility rules.'
  tags: []
  task_ref: task-2
- kind: discovery
  content: 'Attack surface mapped in app.py: 11 routes total. Public/unauthenticated: POST /register, POST /login, GET /profile/<username>, GET /admin/users, GET /posts, GET /export, POST /import-config, POST /upload. Session-authenticated: POST /posts, POST /api/key. Admin-session gated: POST /admin/exec. Trust boundaries include JSON body, query string user_id, path username, raw request body for YAML, multipart filename/content, Flask session cookie, and base64-encoded serialized input to /export.'
  tags: []
  task_ref: task-1
