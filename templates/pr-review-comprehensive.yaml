# ============================================================
# CONTEXT ENTRIES (15+)
# ============================================================
context:
# Patterns from past reviews
- kind: pattern
  content: "SQL injection remains the #1 finding in PR reviews. Always check string concatenation in queries, f-strings in SQL, and template literals building queries. Parameterized queries are the only safe approach."
  tags: [security, injection]
  task_ref: sec-injection

- kind: pattern
  content: "Hardcoded secrets most commonly appear in: test fixtures (real API keys used for testing), Docker Compose files (database passwords), CI configs (.env values in YAML), and documentation (example configs with real values)."
  tags: [security, secrets]
  task_ref: sec-secrets

- kind: pattern
  content: "N+1 query patterns are the most common performance regression in PR reviews. Check any loop that makes database or API calls. Look for ORM lazy loading in list endpoints."
  tags: [performance, quality]
  task_ref: qual-perf

- kind: pattern
  content: "Test coverage: error paths are 3x more likely to have bugs than happy paths, but 5x less likely to be tested. Focus review on error handling test coverage first."
  tags: [testing]
  task_ref: test-error-paths

- kind: pattern
  content: "Breaking API changes often hide in: changed response shapes (field renamed/removed), new required request fields, changed error response codes, altered pagination behavior, and removed query parameters."
  tags: [architecture, api]
  task_ref: arch-breaking

- kind: pattern
  content: "Flaky test patterns to flag: sleep-based synchronization, fixed port numbers, tests depending on system time, shared database state between tests, non-deterministic ordering assertions on sets/maps."
  tags: [testing, flaky]
  task_ref: test-flaky

- kind: pattern
  content: "Common CSRF bypass attempts: GET requests for state changes, JSON content-type without CORS preflight, Flash-based cross-origin requests. Verify all state-changing operations use POST/PUT/DELETE with CSRF tokens."
  tags: [security, csrf]
  task_ref: sec-csrf

# Common pitfalls per category
- kind: constraint
  content: "Never approve a PR that adds pickle.loads, yaml.load (without SafeLoader), or eval() on user-controlled input. These are always critical severity, no exceptions."
  tags: [security, blocker]
  task_ref: sec-deser

- kind: constraint
  content: "Schema migrations on large tables (>1M rows) must be evaluated for locking behavior. ALTER TABLE ADD COLUMN with DEFAULT in PostgreSQL <11 locks the table. Prefer nullable columns with backfill."
  tags: [architecture, database]
  task_ref: arch-schema

- kind: constraint
  content: "New dependencies must be justified. Check: last commit date (abandoned if >1 year), open issue count, download count, license compatibility (no GPL in MIT projects), and whether the functionality exists in the stdlib."
  tags: [architecture, dependencies]
  task_ref: arch-deps

- kind: constraint
  content: "GitHub PR comment limit is 65,535 characters. Reports must fit in a single comment. Use collapsible sections for verbose details and limit inline code suggestions to critical findings only."
  tags: [report]
  task_ref: report-format

- kind: constraint
  content: "CI pipeline changes should be tested in a separate PR first when possible. A broken CI pipeline blocks the entire team. Verify syntax with the CI provider's linter before merging."
  tags: [devops, ci]
  task_ref: devops-ci

# Review priorities
- kind: insight
  content: "Review priority order: (1) Security blockers - exploitable vulnerabilities, (2) Data integrity - migrations, schema changes, (3) Correctness - logic bugs, missing error handling, (4) Performance - N+1 queries, unbounded operations, (5) Maintainability - naming, structure, docs."
  tags: [review, priority]
  task_ref: synth-prioritize

- kind: insight
  content: "The most impactful review comments are on architecture and API design, not code style. Style issues should be caught by linters. Focus reviewer time on structural decisions that are expensive to change later."
  tags: [review, strategy]
  task_ref: null

- kind: insight
  content: "For large PRs (>500 lines changed), recommend splitting into smaller PRs if logically separable. Large PRs get superficial reviews. The ideal PR size is 200-400 lines of meaningful changes."
  tags: [review, strategy]
  task_ref: parse-desc

- kind: insight
  content: "When reviewing test code, verify tests actually assert meaningful behavior. Watch for: tests that only check 'no exception thrown', assertions on mock return values (testing the mock, not the code), and tests that pass with the implementation deleted."
  tags: [testing, quality]
  task_ref: test-unit

- kind: discovery
  content: "Cross-phase findings are highest value: a security issue that also affects performance (e.g., ReDoS), or an architecture issue that also creates testing difficulties (tight coupling making mocks unreliable)."
  tags: [review, cross-phase]
  task_ref: synth-dedup
