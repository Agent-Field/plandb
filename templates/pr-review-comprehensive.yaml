  tags: []
  task_ref: null
- kind: constraint
  content: 'Set env vars before running: export PLANDB_PR_NUMBER=4 PLANDB_PR_REPO=Owner/repo'
  tags: []
  task_ref: null
- kind: constraint
  content: 'Severities: CRITICAL (must fix), HIGH (should fix), MEDIUM (consider), LOW (nitpick)'
  tags: []
  task_ref: null
- kind: pattern
  content: Check .unwrap_or_default() on fallible operations — silent error swallowing
  tags: []
