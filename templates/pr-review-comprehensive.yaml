name: PR Review Pipeline (Adaptive)
description: null
tasks:
- ref_id: task-1
  title: Parse PR diff
  description: 'Read the PR diff and source files. Map: changed files, languages, line counts, affected modules. Identify the PR''s intent from commit messages and description.'
  kind: research
  priority: 0
  parent_ref: null
  pre_condition: null
  post_condition: diff summary documented with file list and change intent
  pre_hook: echo "=== PR Review started at $(date) ==="
  post_hook: echo "Parse complete. Starting parallel reviews."
- ref_id: task-2
  title: 'Review: injection vectors'
  description: Check for SQL injection, command injection, XSS, template injection, path traversal. Look at all user input handling. Record each finding with plandb context --kind finding including file:line, severity, and remediation.
  kind: review
  priority: 0
  parent_ref: null
  pre_condition: null
  post_condition: all injection findings documented
  pre_hook: null
  post_hook: plandb search "injection" --kind finding 2>/dev/null | head -5
- ref_id: task-3
  title: 'Review: auth and access control'
  description: Check authentication on all endpoints, authorization checks, IDOR, privilege escalation, session management. Record findings.
  kind: review
  priority: 0
  parent_ref: null
  pre_condition: null
  post_condition: auth coverage verified for all endpoints
  pre_hook: null
  post_hook: null
- ref_id: task-4
  title: 'Review: secrets and crypto'
  description: Check for hardcoded secrets, weak hashing, insecure random, missing encryption. Check configs, env vars, default values. Record findings.
  kind: review
  priority: 0
  parent_ref: null
  pre_condition: null
  post_condition: no secrets in source, crypto choices documented
  pre_hook: null
  post_hook: null
- ref_id: task-5
  title: 'Review: data integrity'
  description: Check serialization safety (pickle, yaml.load, eval), file upload handling, SSRF, CORS config. Record findings.
  kind: review
  priority: 0
  parent_ref: null
  pre_condition: null
  post_condition: data handling reviewed
  pre_hook: null
  post_hook: null
- ref_id: task-6
  title: 'Review: error handling'
  description: 'Check error handling: are errors silently swallowed? Are error messages informative? Are panics/unwraps used where Results should be? Record findings.'
  kind: review
  priority: 0
  parent_ref: null
  pre_condition: null
  post_condition: error handling patterns documented
  pre_hook: null
  post_hook: null
- ref_id: task-7
  title: 'Review: naming and consistency'
  description: Check naming conventions, consistent patterns across similar code, API consistency between CLI/MCP/HTTP interfaces. Flag drift. Record findings.
  kind: review
  priority: 0
  parent_ref: null
  pre_condition: null
  post_condition: naming issues documented
  pre_hook: null
  post_hook: null
- ref_id: task-8
  title: 'Review: code duplication'
  description: Find duplicated logic that should be shared. Check if similar code in CLI/MCP/HTTP could be consolidated. Record findings.
  kind: review
  priority: 0
  parent_ref: null
  pre_condition: null
  post_condition: duplication issues documented
  pre_hook: null
  post_hook: null
- ref_id: task-9
  title: 'Review: complexity and performance'
  description: Check for unnecessary DB queries, O(n^2) patterns, missing indexes, large allocations. Record findings.
  kind: review
  priority: 0
  parent_ref: null
  pre_condition: null
  post_condition: performance concerns documented
  pre_hook: null
  post_hook: null
- ref_id: task-10
  title: 'Review: test coverage'
  description: Check which new features have tests and which don't. List untested code paths. Record findings as plandb context --kind finding.
  kind: review
  priority: 0
  parent_ref: null
  pre_condition: null
  post_condition: test gaps documented
  pre_hook: null
  post_hook: null
- ref_id: task-11
  title: 'Review: test quality'
  description: 'Check existing tests: are assertions meaningful? Are edge cases covered? Are mocks appropriate? Record findings.'
  kind: review
  priority: 0
  parent_ref: null
  pre_condition: null
  post_condition: test quality issues documented
  pre_hook: null
  post_hook: null
- ref_id: task-12
  title: 'Review: API design'
  description: 'Check API consistency: do CLI, MCP, and HTTP interfaces expose the same features? Are response shapes consistent? Flag missing features in any interface. Record findings.'
  kind: review
  priority: 0
  parent_ref: null
  pre_condition: null
  post_condition: API parity issues documented
  pre_hook: null
  post_hook: null
- ref_id: task-13
  title: 'Review: schema and migrations'
  description: 'Check database schema changes: are migrations safe? Are new columns nullable? Is FTS kept in sync? Record findings.'
  kind: review
  priority: 0
  parent_ref: null
  pre_condition: null
  post_condition: schema issues documented
  pre_hook: null
  post_hook: null
- ref_id: task-14
  title: 'Review: docs accuracy'
  description: Check if README, help text, and prompts match the actual code. Flag any discrepancy between documented and actual behavior. Record findings.
  kind: review
  priority: 0
  parent_ref: null
  pre_condition: null
  post_condition: docs accuracy verified
  pre_hook: null
  post_hook: null
- ref_id: task-15
  title: Synthesize findings
  description: 'Use plandb search to gather ALL findings. Deduplicate. Classify by severity (critical/high/medium/low). Prioritize by impact. Output: structured summary with counts per severity.'
  kind: research
  priority: 0
  parent_ref: null
  pre_condition: null
  post_condition: findings deduplicated and prioritized
  pre_hook: null
  post_hook: null
- ref_id: task-16
  title: Post PR review comments
  description: 'For EACH finding from synthesis: create a separate, focused comment. Group by severity. Each comment should include: severity, file:line reference, description, suggested fix. Use the structured result from synthesis to generate comments. The final comment should be a summary with verdict (approve/request-changes/comment).'
  kind: code
  priority: 0
  parent_ref: null
  pre_condition: null
  post_condition: all findings posted as individual comments
  pre_hook: null
  post_hook: echo "=== PR Review complete at $(date) ==="
