context:
- kind: constraint
  content: Post each finding as a SEPARATE comment, not one big dump. Include file:line, severity, and suggested fix.
  tags: []
  task_ref: null
- kind: pattern
  content: 'Check for silent error swallowing: .unwrap_or_default() on operations that should surface errors'
  tags: []
  task_ref: null
- kind: pattern
  content: 'API parity: if a feature exists in CLI, it should also work in MCP and HTTP'
  tags: []
  task_ref: null
- kind: pattern
  content: Hooks that execute shell commands from untrusted input are a security concern
  tags: []
  task_ref: null
- kind: pattern
  content: SQL parameter count must match INSERT statement after schema changes
  tags: []
  task_ref: null
- kind: pattern
  content: FTS indexes must be updated whenever the indexed columns change (INSERT, UPDATE, DELETE)
  tags: []
  task_ref: null
- kind: constraint
  content: Use plandb done --result with structured JSON so synthesis can aggregate programmatically
  tags: []
  task_ref: null

