name: PR Review Pipeline (Inline Comments)
description: null
tasks:
- ref_id: task-1
  title: Parse PR diff
  description: 'Read the PR diff and source files. Map changed files, languages, line counts, affected modules. Output: structured JSON with file list and change categories.'
  kind: research
  priority: 0
  parent_ref: null
  pre_condition: null
  post_condition: diff summary with file list documented via --result
  pre_hook: null
  post_hook: null
- ref_id: task-2
  title: 'Review: injection and input safety'
  description: |-
    Check for SQL injection, command injection, XSS, template injection, path traversal, SSRF.

    For EACH finding, post an inline review comment:
      gh api repos/$PLANDB_PR_REPO/pulls/$PLANDB_PR_NUMBER/comments -f body='**[SEVERITY]** description' -f commit_id=$(git rev-parse HEAD) -f path='src/path/to/file.rs' -f line=42 -f side=RIGHT

    Also record with: plandb context '[SEVERITY] file:line — desc' --kind finding
  kind: review
  priority: 0
  parent_ref: null
  pre_condition: null
  post_condition: all injection findings posted as inline comments
  pre_hook: null
  post_hook: null
- ref_id: task-3
  title: 'Review: auth, secrets, and crypto'
  description: |-
    Check authentication, authorization, IDOR, hardcoded secrets, weak hashing, session management.

    For EACH finding, post inline:
      gh api repos/$PLANDB_PR_REPO/pulls/$PLANDB_PR_NUMBER/comments -f body='**[SEVERITY]** description' -f commit_id=$(git rev-parse HEAD) -f path='file' -f line=N -f side=RIGHT

    Record: plandb context '[SEVERITY] file:line — desc' --kind finding
  kind: review
  priority: 0
  parent_ref: null
  pre_condition: null
  post_condition: auth and secrets findings posted inline
  pre_hook: null
  post_hook: null
- ref_id: task-4
  title: 'Review: data integrity and serialization'
  description: Check unsafe deserialization (pickle, yaml.load), file uploads, CORS, data exposure. Post inline comments for findings.
  kind: review
  priority: 0
  parent_ref: null
  pre_condition: null
  post_condition: data handling findings posted inline
  pre_hook: null
  post_hook: null
- ref_id: task-5
  title: 'Review: error handling and robustness'
  description: Check for silently swallowed errors (.unwrap_or_default on fallible ops), missing error propagation, panics. Post inline comments.
  kind: review
  priority: 0
  parent_ref: null
  pre_condition: null
  post_condition: error handling findings posted inline
  pre_hook: null
  post_hook: null
- ref_id: task-6
  title: 'Review: consistency and duplication'
  description: Check API parity across CLI/MCP/HTTP, response shape drift, naming inconsistencies, duplicated logic. Post inline comments.
  kind: review
  priority: 0
  parent_ref: null
  pre_condition: null
  post_condition: consistency findings posted inline
  pre_hook: null
  post_hook: null
- ref_id: task-7
  title: 'Review: test coverage gaps'
  description: Identify new features without tests. For each gap, post inline comment on the untested code. Record findings.
  kind: review
  priority: 0
  parent_ref: null
  pre_condition: null
  post_condition: test gaps posted inline
  pre_hook: null
  post_hook: null
- ref_id: task-8
  title: 'Review: schema and migrations'
  description: Check database schema changes, FTS sync, SQL parameter counts, migration safety. Post inline comments.
  kind: review
  priority: 0
  parent_ref: null
  pre_condition: null
  post_condition: schema findings posted inline
  pre_hook: null
  post_hook: null
- ref_id: task-9
  title: 'Review: docs and prompt accuracy'
  description: Check if README, --help, and prompts match actual code. Flag discrepancies with inline comments on the wrong docs.
  kind: review
  priority: 0
  parent_ref: null
  pre_condition: null
  post_condition: docs discrepancies posted inline
  pre_hook: null
  post_hook: null
- ref_id: task-10
  title: Submit PR review verdict
  description: "Gather all findings via plandb search. Count by severity. Submit a GitHub PR review:\n\n  gh api repos/$PLANDB_PR_REPO/pulls/$PLANDB_PR_NUMBER/reviews -f event=COMMENT -f body='## PR Review Summary\n  \n  | Severity | Count |\n  |----------|-------|\n  | Critical | N |\n  | High | N |\n  | Medium | N |\n  | Low | N |\n  \n  **Verdict:** APPROVE / REQUEST_CHANGES / COMMENT\n  \n  *Reviewed by PlanDB PR Review Template*'\n\nUse event=REQUEST_CHANGES if any critical/high findings, COMMENT otherwise."
  kind: code
  priority: 0
  parent_ref: null
  pre_condition: null
  post_condition: PR review submitted with verdict
  pre_hook: null
  post_hook: null
