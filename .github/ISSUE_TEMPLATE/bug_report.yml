name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal commands to reproduce the issue.
      placeholder: |
        plandb init "test"
        plandb add "Task A" --as a
        plandb add "Task B" --dep t-a
        # expected: ...
        # actual: ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: PlanDB version
      description: Output of `plandb --version`
    validations:
      required: true
  - type: dropdown
    id: interface
    attributes:
      label: Interface
      options:
        - CLI
        - MCP
        - HTTP
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: macOS 15.2 / Ubuntu 24.04 / Windows 11
